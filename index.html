<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>חידו</title>
    <meta name="description" content="אפליקציית חידוני טריוויה מהנה עם מאות שאלות">
    <meta name="theme-color" content="#0C1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="חידו">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A78BFA;
            --primary-dark: #7C3AED;
            --primary-light: #C4B5FD;
            --correct: #34D399;
            --wrong: #FB7185;
            --bg: #0C1117;
            --bg-card: #131C27;
            --bg-card-hover: #1A2736;
            --text: #E8F0F8;
            --text-secondary: #8BA4BC;
            --border: #1E3044;
            --gold: #FBBF24;
            --mint: #6EE7B7;
            --mint-dark: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(167,139,250,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(110,231,183,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(124,58,237,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            padding-top: env(safe-area-inset-top, 16px);
            padding-bottom: env(safe-area-inset-bottom, 16px);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--mint), var(--primary-light), var(--primary));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            cursor: pointer;
            user-select: none;
        }

        .stats-nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .stats-nav-btn:hover {
            border-color: var(--primary);
            background: var(--bg-card-hover);
            transform: scale(1.1);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* SCREENS + TRANSITIONS */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(16px);
        }
        .screen.active {
            display: block;
            animation: screenIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .screen.exiting {
            display: block;
            animation: screenOut 0.25s ease forwards;
        }
        @keyframes screenIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes screenOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-12px); }
        }

        /* START SCREEN */
        .start-screen { text-align: center; padding-top: 50px; }
        .hero-emoji { font-size: 5rem; margin-bottom: 20px; animation: bounce 2s ease infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .hero-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
        .hero-desc {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 50px;
            line-height: 1.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 48px;
            border: none;
            border-radius: 50px;
            font-family: 'Heebo', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 2px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--primary); background: var(--bg-card-hover); }

        /* QUIZ TOP BAR */
        .quiz-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px 0;
        }
        .quiz-stats { display: flex; gap: 12px; align-items: center; }
        .stat-badge {
            display: flex; align-items: center; gap: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 14px;
            font-size: 0.9rem; font-weight: 600;
        }
        .stat-badge .icon { font-size: 1rem; }

        /* PROGRESS */
        .progress-container {
            background: var(--bg-card);
            border-radius: 20px;
            height: 6px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--mint-dark), var(--mint));
            border-radius: 20px;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .progress-text {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        /* QUESTION - with transition */
        .question-area {
            position: relative;
            overflow: hidden;
        }
        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 20px;
        }
        .question-card.entering {
            animation: qSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .question-card.exiting-q {
            animation: qSlideOut 0.25s ease forwards;
        }
        @keyframes qSlideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes qSlideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-40px); }
        }

        .question-category {
            display: inline-flex;
            align-items: center; gap: 6px;
            background: rgba(167,139,250,0.15);
            color: var(--primary-light);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem; font-weight: 600;
            margin-bottom: 14px;
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.7;
        }

        /* ANSWERS with stagger */
        .answers-grid { display: grid; gap: 10px; margin-bottom: 16px; }
        .answer-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: right;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(10px);
            animation: answerIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .answer-btn:nth-child(1) { animation-delay: 0.05s; }
        .answer-btn:nth-child(2) { animation-delay: 0.1s; }
        .answer-btn:nth-child(3) { animation-delay: 0.15s; }
        .answer-btn:nth-child(4) { animation-delay: 0.2s; }

        @keyframes answerIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .answer-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(167,139,250,0.08);
            transform: translateX(-4px);
        }
        .answer-btn:active:not(.disabled) {
            transform: scale(0.98);
        }
        .answer-btn .answer-letter {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(167,139,250,0.15);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem;
            color: var(--primary-light);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .answer-btn.correct {
            border-color: var(--correct);
            background: rgba(52,211,153,0.1);
            animation: correctPop 0.4s ease;
        }
        .answer-btn.correct .answer-letter { background: var(--correct); color: white; }
        .answer-btn.wrong {
            border-color: var(--wrong);
            background: rgba(251,113,133,0.1);
            animation: shake 0.4s ease;
        }
        .answer-btn.wrong .answer-letter { background: var(--wrong); color: white; }
        .answer-btn.disabled { cursor: default; opacity: 0.5; }
        .answer-btn.disabled.correct { opacity: 1; }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        /* FEEDBACK */
        .feedback-area {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .feedback-area.show { max-height: 180px; }

        .feedback-card {
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 12px;
        }
        .feedback-card.correct-feedback {
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.3);
        }
        .feedback-card.wrong-feedback {
            background: rgba(251,113,133,0.1);
            border: 1px solid rgba(251,113,133,0.3);
        }
        .feedback-icon { font-size: 1.6rem; flex-shrink: 0; }
        .feedback-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 2px; }
        .feedback-text { font-size: 0.9rem; line-height: 1.5; color: var(--text-secondary); }

        .next-btn-container {
            text-align: center; margin-top: 14px;
            opacity: 0;
            animation: fadeInUp 0.3s ease 0.25s forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESULTS */
        .results-screen { text-align: center; padding-top: 16px; }
        .results-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 24px;
            margin-bottom: 20px;
        }
        .results-emoji { font-size: 3.5rem; margin-bottom: 14px; }
        .results-title { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
        .results-subtitle { color: var(--text-secondary); font-size: 1rem; margin-bottom: 28px; }

        .score-circle {
            width: 150px; height: 150px;
            margin: 0 auto 26px;
            position: relative;
        }
        .score-circle svg { transform: rotate(-90deg); width: 150px; height: 150px; }
        .score-circle circle { fill: none; stroke-width: 8; }
        .score-circle .bg { stroke: var(--border); }
        .score-circle .fg {
            stroke: var(--primary);
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .score-number {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .score-number .big { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .score-number .label { font-size: 0.75rem; color: var(--text-secondary); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(110,231,183,0.08);
            border-radius: 16px;
            padding: 14px 10px;
        }
        .stat-card .value { font-size: 1.4rem; font-weight: 800; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

        .results-buttons {
            display: flex; gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .share-btn {
            background: linear-gradient(135deg, var(--mint-dark), var(--mint));
            color: #0C1117;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(16,185,129,0.3);
        }
        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(16,185,129,0.4);
        }

        /* STATISTICS SCREEN */
        .all-stats-screen { padding-top: 16px; }
        .all-stats-header { text-align: center; margin-bottom: 24px; }
        .all-stats-header h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
        .all-stats-header p { color: var(--text-secondary); font-size: 0.9rem; }

        .big-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin-bottom: 20px;
        }
        .big-stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 14px;
            text-align: center;
        }
        .big-stat-card .emoji { font-size: 1.6rem; margin-bottom: 6px; }
        .big-stat-card .value { font-size: 1.8rem; font-weight: 900; }
        .big-stat-card .label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

        .category-stats-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
        .category-stat-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 10px;
        }
        .cat-stat-icon { font-size: 1.3rem; }
        .cat-stat-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
        .cat-stat-bar-container {
            flex: 1; background: var(--border);
            border-radius: 10px; height: 6px; overflow: hidden;
        }
        .cat-stat-bar {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, var(--mint-dark), var(--mint));
            transition: width 0.6s ease;
        }
        .cat-stat-percent { font-weight: 700; font-size: 0.85rem; min-width: 40px; text-align: left; }

        .reset-stats-btn {
            display: block; margin: 24px auto 0;
            background: none; border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: 'Heebo', sans-serif;
            font-size: 0.8rem;
            padding: 8px 18px; border-radius: 20px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .reset-stats-btn:hover { border-color: var(--wrong); color: var(--wrong); }

        .back-bar { text-align: center; margin-bottom: 16px; }

        /* SHARE CANVAS (hidden) */
        #shareCanvas { display: none; }

        /* INSTALL BANNER */
        .install-banner {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 16px;
            align-items: center;
            gap: 12px;
            animation: fadeInUp 0.4s ease;
        }
        .install-banner.show { display: flex; }
        .install-banner-text { flex: 1; font-size: 0.9rem; }
        .install-banner-text strong { color: var(--mint); }
        .install-btn {
            background: var(--primary-dark);
            color: white;
            border: none; border-radius: 10px;
            padding: 8px 16px;
            font-family: 'Heebo', sans-serif;
            font-weight: 600; font-size: 0.85rem;
            cursor: pointer;
        }
        .install-dismiss {
            background: none; border: none;
            color: var(--text-secondary);
            font-size: 1.2rem; cursor: pointer;
            padding: 4px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 0.9rem; font-weight: 600;
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .app { padding: 10px; }
            .logo { font-size: 1.8rem; }
            .question-text { font-size: 1.1rem; }
            .question-card { padding: 22px 18px; }
            .answer-btn { padding: 14px 16px; font-size: 0.95rem; }
            .quiz-stats { gap: 8px; }
            .stat-badge { padding: 6px 10px; font-size: 0.8rem; }
            .hero-title { font-size: 1.6rem; }
            .hero-emoji { font-size: 4rem; }
            .btn { padding: 14px 32px; font-size: 1rem; }
            .results-card { padding: 28px 18px; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo" onclick="showStart()">חידו</div>
            <button class="stats-nav-btn" onclick="showAllStats()" title="סטטיסטיקות">📊</button>
        </div>

        <!-- INSTALL BANNER -->
        <div class="install-banner" id="installBanner">
            <div class="install-banner-text">
                <strong>התקינו את האפליקציה</strong> למסך הבית לגישה מהירה!
            </div>
            <button class="install-btn" id="installBtn" onclick="installApp()">התקנה</button>
            <button class="install-dismiss" onclick="dismissInstall()">✕</button>
        </div>

        <!-- START SCREEN -->
        <div class="screen active" id="startScreen">
            <div class="start-screen">
                <div class="hero-emoji">🧠</div>
                <h1 class="hero-title">שנתחיל?</h1>
                <p class="hero-desc">18 שאלות אקראיות מקטגוריות שונות.<br>בסוף תקבלו סיכום מפורט.</p>
                <button class="btn btn-primary" onclick="startQuiz()">יאללה, מתחילים!</button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div class="screen" id="quizScreen">
            <div class="quiz-top-bar">
                <div class="quiz-stats">
                    <div class="stat-badge"><span class="icon">✅</span><span id="correctCount">0</span></div>
                    <div class="stat-badge"><span class="icon">❌</span><span id="wrongCount">0</span></div>
                </div>
                <button class="btn btn-secondary" style="padding:8px 16px;font-size:0.85rem;border-radius:12px" onclick="quitQuiz()">יציאה</button>
            </div>
            <div class="progress-text" id="progressText">שאלה 1 מתוך 18</div>
            <div class="progress-container"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
            <div class="question-area">
                <div class="question-card" id="questionCard">
                    <div class="question-category" id="questionCategory"></div>
                    <div class="question-text" id="questionText"></div>
                </div>
            </div>
            <div class="answers-grid" id="answersGrid"></div>
            <div class="feedback-area" id="feedbackArea">
                <div class="feedback-card" id="feedbackCard">
                    <div class="feedback-icon" id="feedbackIcon"></div>
                    <div>
                        <div class="feedback-title" id="feedbackTitle"></div>
                        <div class="feedback-text" id="feedbackText"></div>
                    </div>
                </div>
                <div class="next-btn-container">
                    <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">השאלה הבאה ➜</button>
                </div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div class="screen" id="resultsScreen">
            <div class="results-screen">
                <div class="results-card" id="resultsCard">
                    <div class="results-emoji" id="resultsEmoji">🏆</div>
                    <div class="results-title" id="resultsTitle">סיכום החידון</div>
                    <div class="results-subtitle" id="resultsSubtitle"></div>
                    <div class="score-circle">
                        <svg><circle class="bg" cx="75" cy="75" r="65"></circle>
                        <circle class="fg" id="scoreCircle" cx="75" cy="75" r="65"
                            stroke-dasharray="408.4" stroke-dashoffset="408.4"></circle></svg>
                        <div class="score-number">
                            <div class="big" id="scorePercent">0%</div>
                            <div class="label">אחוז הצלחה</div>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="value" id="statCorrect" style="color:var(--correct)">0</div><div class="label">תשובות נכונות</div></div>
                        <div class="stat-card"><div class="value" id="statWrong" style="color:var(--wrong)">0</div><div class="label">תשובות שגויות</div></div>
                    </div>

        { q: "מהי המטבע הרשמית של יפן?", a: ["יואן", "וון", "ין", "רופי"], c: 2, cat: "ידע כללי" },
        { q: "כמה מדינות באיחוד האירופי?", a: ["25", "27", "28", "30"], c: 1, cat: "ידע כללי" },
        { q: "כמה כוכבים על דגל ארה\"ב?", a: ["48", "50", "51", "52"], c: 1, cat: "ידע כללי" },
        { q: "מהו הסמל הכימי של מים?", a: ["HO", "H2O", "OH2", "H3O"], c: 1, cat: "ידע כללי" },
        { q: "כמה דקות יש ביום?", a: ["1,240", "1,340", "1,440", "1,540"], c: 2, cat: "ידע כללי" },
        { q: "מהו הצבע הראשון בקשת?", a: ["כתום", "אדום", "צהוב", "סגול"], c: 1, cat: "ידע כללי" },
        { q: "מהו סימן הזודיאק הראשון?", a: ["שור", "טלה", "תאומים", "דגים"], c: 1, cat: "ידע כללי" },
        { q: "כמה קלפים בחפיסה רגילה?", a: ["48", "50", "52", "54"], c: 2, cat: "ידע כללי" },
        { q: "מהו המספר הרומי של 50?", a: ["C", "L", "D", "V"], c: 1, cat: "ידע כללי" },
        { q: "כמה מיתרים יש לגיטרה רגילה?", a: ["4", "5", "6", "7"], c: 2, cat: "ידע כללי" },
        { q: "מהי השנה המעוברת הבאה?", a: ["2024", "2026", "2028", "2030"], c: 2, cat: "ידע כללי" },
        { q: "כמה תווים יש בסולם מוזיקלי?", a: ["5", "6", "7", "8"], c: 2, cat: "ידע כללי" },
    ];

    const categoryMeta = {
        "גיאוגרפיה": { icon: "🌍" }, "היסטוריה": { icon: "📜" }, "מדע": { icon: "🔬" },
        "תרבות": { icon: "🎭" }, "ספורט": { icon: "⚽" }, "טבע": { icon: "🦁" },
        "ישראל": { icon: "🇮🇱" }, "מיתולוגיה": { icon: "⚡" }, "אוכל": { icon: "🍕" },
        "שפה": { icon: "📝" }, "ידע כללי": { icon: "💡" },
    };

    // ===== STATE =====
    let currentQuiz = [];
    let currentIndex = 0;
    let score = 0;
    let wrongCount = 0;
    let answered = false;
    let correctIndicesThisQuiz = [];
    let lastPercent = 0;
    const QUIZ_SIZE = 18;
    let deferredPrompt = null;

    // ===== STATS =====
    function loadStats() {
        try { return JSON.parse(localStorage.getItem('triviaStats')) || defaultStats(); }
        catch { return defaultStats(); }
    }
    function defaultStats() {
        return { totalQuizzes: 0, totalCorrect: 0, totalQuestions: 0, bestPercent: 0, categories: {} };
    }
    function saveStats(s) { localStorage.setItem('triviaStats', JSON.stringify(s)); }

    function recordQuizResult(quizQ, correctIdx) {
        const stats = loadStats();
        stats.totalQuizzes++;
        stats.totalCorrect += correctIdx.length;
        stats.totalQuestions += quizQ.length;
        const pct = Math.round((correctIdx.length / quizQ.length) * 100);
        if (pct > stats.bestPercent) stats.bestPercent = pct;
        quizQ.forEach((q, i) => {
            if (!stats.categories[q.cat]) stats.categories[q.cat] = { correct: 0, total: 0 };
            stats.categories[q.cat].total++;
            if (correctIdx.includes(i)) stats.categories[q.cat].correct++;
        });
        saveStats(stats);
    }

    // ===== SCREEN TRANSITION =====
    function showScreen(id) {
        const current = document.querySelector('.screen.active');
        const next = document.getElementById(id);
        if (current === next) return;

        if (current) {
            current.classList.remove('active');
            current.classList.add('exiting');
            current.addEventListener('animationend', () => {
                current.classList.remove('exiting');
            }, { once: true });
        }

        setTimeout(() => {
            next.classList.add('active');
        }, current ? 200 : 0);
    }

    // ===== QUIZ =====
    function startQuiz() {
        let pool = shuffleArray([...questions]);
        currentQuiz = pool.slice(0, Math.min(QUIZ_SIZE, pool.length));
        currentIndex = 0;
        score = 0;
        wrongCount = 0;
        answered = false;
        correctIndicesThisQuiz = [];
        showScreen('quizScreen');
        updateQuizStats();
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentQuiz.length) { showResults(); return; }
        answered = false;
        const q = currentQuiz[currentIndex];
        const letters = ['א', 'ב', 'ג', 'ד'];

        document.getElementById('progressText').textContent = `שאלה ${currentIndex + 1} מתוך ${currentQuiz.length}`;
        document.getElementById('progressBar').style.width = `${((currentIndex) / currentQuiz.length) * 100}%`;

        const meta = categoryMeta[q.cat] || { icon: '💡' };
        document.getElementById('questionCategory').innerHTML = `${meta.icon} ${q.cat}`;
        document.getElementById('questionText').textContent = q.q;

        // Animate question card
        const card = document.getElementById('questionCard');
        card.classList.remove('entering', 'exiting-q');
        void card.offsetHeight;
        card.classList.add('entering');

        const grid = document.getElementById('answersGrid');
        grid.innerHTML = q.a.map((ans, i) => `
            <button class="answer-btn" onclick="selectAnswer(${i})">
                <span class="answer-letter">${letters[i]}</span>
                <span>${ans}</span>
            </button>
        `).join('');

        document.getElementById('feedbackArea').classList.remove('show');
    }

    function selectAnswer(index) {
        if (answered) return;
        answered = true;
        const q = currentQuiz[currentIndex];
        const isCorrect = index === q.c;
        const buttons = document.querySelectorAll('.answer-btn');
        buttons.forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === q.c) btn.classList.add('correct');
            if (i === index && !isCorrect) btn.classList.add('wrong');
        });
        if (isCorrect) { score++; correctIndicesThisQuiz.push(currentIndex); }
        else { wrongCount++; }
        updateQuizStats();
        showFeedback(isCorrect, q);
    }

    function showFeedback(isCorrect, q) {
        const card = document.getElementById('feedbackCard');
        const icon = document.getElementById('feedbackIcon');
        const title = document.getElementById('feedbackTitle');
        const text = document.getElementById('feedbackText');
        const nextBtn = document.getElementById('nextBtn');

        card.className = 'feedback-card ' + (isCorrect ? 'correct-feedback' : 'wrong-feedback');
        if (isCorrect) {
            const m = ['מדהים!', 'נכון!', 'בול פגיעה!', 'מצוין!', 'יופי!'];
            icon.textContent = '✅';
            title.textContent = m[Math.floor(Math.random() * m.length)];
            text.textContent = '';
        } else {
            const m = ['לא הפעם...', 'כמעט!', 'ממשיכים!', 'בפעם הבאה!'];
            icon.textContent = '❌';
            title.textContent = m[Math.floor(Math.random() * m.length)];
            text.textContent = `התשובה הנכונה: ${q.a[q.c]}`;
        }
        nextBtn.textContent = currentIndex >= currentQuiz.length - 1 ? '📊 לתוצאות' : 'השאלה הבאה ➜';
        document.getElementById('feedbackArea').classList.add('show');
    }

    function nextQuestion() {
        // Animate out
        const card = document.getElementById('questionCard');
        card.classList.remove('entering');
        card.classList.add('exiting-q');

        setTimeout(() => {
            currentIndex++;
            showQuestion();
        }, 200);
    }

    function updateQuizStats() {
        document.getElementById('correctCount').textContent = score;
        document.getElementById('wrongCount').textContent = wrongCount;
    }

    // ===== RESULTS =====
    function showResults() {
        recordQuizResult(currentQuiz, correctIndicesThisQuiz);
        const total = currentQuiz.length;
        const percent = Math.round((score / total) * 100);
        lastPercent = percent;

        let emoji, title, subtitle;
        if (percent === 100) { emoji = '🏆'; title = 'מושלם!'; subtitle = 'ענית נכון על כל השאלות!'; }
        else if (percent >= 80) { emoji = '🌟'; title = 'מרשים מאוד!'; subtitle = 'ידע כללי ברמה גבוהה!'; }
        else if (percent >= 60) { emoji = '👍'; title = 'כל הכבוד!'; subtitle = 'תוצאה טובה, יש מקום לשיפור!'; }
        else if (percent >= 40) { emoji = '😊'; title = 'לא רע!'; subtitle = 'נסו שוב ותשתפרו!'; }
        else { emoji = '💪'; title = 'ממשיכים!'; subtitle = 'תרגול עושה את המאסטר!'; }

        document.getElementById('resultsEmoji').textContent = emoji;
        document.getElementById('resultsTitle').textContent = title;
        document.getElementById('resultsSubtitle').textContent = subtitle;
        document.getElementById('statCorrect').textContent = score;
        document.getElementById('statWrong').textContent = wrongCount;
        document.getElementById('scorePercent').textContent = `${percent}%`;

        // Reset circle before showing
        const circle = document.getElementById('scoreCircle');
        circle.style.transition = 'none';
        circle.style.strokeDashoffset = '408.4';
        circle.style.stroke = 'var(--primary)';

        showScreen('resultsScreen');

        setTimeout(() => {
            circle.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1)';
            const offset = 408.4 * (1 - score / total);
            circle.style.strokeDashoffset = offset;
            if (percent >= 80) circle.style.stroke = 'var(--correct)';
            else if (percent >= 50) circle.style.stroke = 'var(--gold)';
            else circle.style.stroke = 'var(--wrong)';
        }, 150);
    }

    // ===== SHARE =====
    async function shareResults() {
        const canvas = document.getElementById('shareCanvas');
        const ctx = canvas.getContext('2d');
        const W = 600, H = 400;
        canvas.width = W; canvas.height = H;

        // Background
        const bg = ctx.createLinearGradient(0, 0, W, H);
        bg.addColorStop(0, '#0C1117');
        bg.addColorStop(1, '#131C27');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Decorative circles
        ctx.fillStyle = 'rgba(167,139,250,0.06)';
        ctx.beginPath(); ctx.arc(100, 80, 120, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(110,231,183,0.05)';
        ctx.beginPath(); ctx.arc(500, 320, 100, 0, Math.PI*2); ctx.fill();

        // Title
        ctx.textAlign = 'center';
        ctx.fillStyle = '#A78BFA';
        ctx.font = '900 32px Heebo, sans-serif';
        ctx.fillText('חידו', W/2, 55);

        // Score circle
        const cx = W/2, cy = 185, r = 65;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = '#1E3044'; ctx.lineWidth = 10; ctx.stroke();

        const pct = lastPercent / 100;
        const color = lastPercent >= 80 ? '#34D399' : lastPercent >= 50 ? '#FBBF24' : '#FB7185';
        ctx.beginPath();
        ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
        ctx.strokeStyle = color; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.stroke();

        ctx.fillStyle = '#E8F0F8';
        ctx.font = '900 40px Heebo, sans-serif';
        ctx.fillText(`${lastPercent}%`, cx, cy + 12);

        // Stats
        ctx.font = '600 18px Heebo, sans-serif';
        ctx.fillStyle = '#34D399';
        ctx.fillText(`✅ ${score} נכונות`, W/2 - 80, 290);
        ctx.fillStyle = '#FB7185';
        ctx.fillText(`❌ ${wrongCount} שגויות`, W/2 + 80, 290);

        // Bottom text
        ctx.fillStyle = '#8BA4BC';
        ctx.font = '400 16px Heebo, sans-serif';
        ctx.fillText('בואו לשחק גם!', W/2, 345);

        // Border
        ctx.strokeStyle = '#1E3044';
        ctx.lineWidth = 2;
        ctx.roundRect(4, 4, W-8, H-8, 16);
        ctx.stroke();

        try {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const file = new File([blob], 'trivia-score.png', { type: 'image/png' });

            if (navigator.share && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    title: 'חידו',
                    text: `קיבלתי ${lastPercent}% בחידון טריוויה! (${score}/${currentQuiz.length})`,
                    files: [file]
                });
            } else if (navigator.share) {
                await navigator.share({
                    title: 'חידו',
                    text: `קיבלתי ${lastPercent}% בחידון טריוויה! (${score}/${currentQuiz.length})`
                });
            } else {
                // Fallback: download image
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'trivia-score.png';
                a.click();
                URL.revokeObjectURL(url);
                showToast('התמונה הורדה!');
            }
        } catch (e) {
            if (e.name !== 'AbortError') showToast('לא ניתן לשתף כרגע');
        }
    }

    // ===== ALL-TIME STATS =====
    function showAllStats() {
        const stats = loadStats();
        const avg = stats.totalQuestions > 0 ? Math.round((stats.totalCorrect / stats.totalQuestions) * 100) : 0;

        document.getElementById('bigStatsGrid').innerHTML = `
            <div class="big-stat-card"><div class="emoji">🎯</div><div class="value">${stats.totalQuizzes}</div><div class="label">חידונים</div></div>
            <div class="big-stat-card"><div class="emoji">✅</div><div class="value">${stats.totalCorrect}</div><div class="label">תשובות נכונות</div></div>
            <div class="big-stat-card"><div class="emoji">📈</div><div class="value">${avg}%</div><div class="label">ממוצע</div></div>
            <div class="big-stat-card"><div class="emoji">🏆</div><div class="value">${stats.bestPercent}%</div><div class="label">שיא אישי</div></div>
        `;

        const cats = Object.entries(stats.categories).sort((a, b) => {
            return (b[1].total > 0 ? b[1].correct/b[1].total : 0) - (a[1].total > 0 ? a[1].correct/a[1].total : 0);
        });
        const cont = document.getElementById('categoryStatsContainer');
        if (!cats.length) {
            cont.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px">שחקו חידון כדי לראות סטטיסטיקות!</p>';
        } else {
            cont.innerHTML = cats.map(([cat, d]) => {
                const pct = d.total > 0 ? Math.round((d.correct/d.total)*100) : 0;
                const meta = categoryMeta[cat] || { icon: '💡' };
                return `<div class="category-stat-row">
                    <div class="cat-stat-icon">${meta.icon}</div>
                    <div class="cat-stat-name">${cat}</div>
                    <div class="cat-stat-bar-container"><div class="cat-stat-bar" style="width:${pct}%"></div></div>
                    <div class="cat-stat-percent">${pct}%</div>
                </div>`;
            }).join('');
        }
        showScreen('allStatsScreen');
    }

    function resetStats() {
        if (confirm('בטוח? כל הנתונים יימחקו.')) {
            localStorage.removeItem('triviaStats');
            showAllStats();
        }
    }

    // ===== NAV =====
    function showStart() { showScreen('startScreen'); }
    function quitQuiz() { if (confirm('לצאת מהחידון?')) showStart(); }

    // ===== TOAST =====
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== PWA INSTALL =====
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').classList.add('show');
    });

    async function installApp() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            document.getElementById('installBanner').classList.remove('show');
            showToast('האפליקציה הותקנה!');
        }
        deferredPrompt = null;
    }

    function dismissInstall() {
        document.getElementById('installBanner').classList.remove('show');
    }

    // ===== UTILS =====
    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('quizScreen').classList.contains('active')) return;
        if (answered && e.key === 'Enter') { nextQuestion(); return; }
        const m = { '1': 0, '2': 1, '3': 2, '4': 3 };
        if (m[e.key] !== undefined && !answered) selectAnswer(m[e.key]);
    });

    // Polyfill roundRect for share canvas
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            this.beginPath();
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
        };
    }

    // Register SW
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    </script>
</body>
</html>
