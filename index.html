<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>חידו</title>
    <meta name="description" content="אפליקציית חידוני טריוויה מהנה עם מאות שאלות">
    <meta name="theme-color" content="#1A110A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="חידו">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F59E0B; --primary-dark: #D97706; --primary-light: #FCD34D;
            --correct: #34D399; --wrong: #F87171;
            --bg: #1A110A; --bg-card: #241A10; --bg-card-hover: #2E2216;
            --text: #FFF5E6; --text-secondary: #BFA47A; --border: #3D2E1A;
            --gold: #F59E0B; --mint: #F59E0B; --mint-dark: #D97706;
            --accent: #E74C3C; --accent-light: #FF8A65;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(231,76,60,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(217,119,6,0.07) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 16px;
            padding-top: env(safe-area-inset-top, 16px); min-height: 100dvh; }

        /* HEADER */
        .header { text-align: center; padding: 16px 0; }
        .logo {
            font-size: 2.4rem; font-weight: 900; cursor: pointer; user-select: none;
            background: linear-gradient(135deg, var(--mint), var(--primary-light), var(--primary));
            background-size: 200% 200%; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: gradientShift 3s ease infinite;
        }
        @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        /* SCREENS */
        .screen { display:none; opacity:0; transform:translateY(16px); }
        .screen.active { display:block; animation: screenIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
        .screen.exiting { display:block; animation: screenOut 0.2s ease forwards; }
        @keyframes screenIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes screenOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-12px)} }

        /* BUTTONS */
        .btn {
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            padding:16px 44px; border:none; border-radius:50px;
            font-family:'Heebo',sans-serif; font-size:1.15rem; font-weight:700;
            cursor:pointer; transition:all 0.3s ease; -webkit-tap-highlight-color:transparent;
        }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; box-shadow:0 4px 20px rgba(217,119,6,0.4); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(217,119,6,0.5); }
        .btn-primary:active { transform:translateY(0); }
        .btn-secondary { background:var(--bg-card); color:var(--text); border:2px solid var(--border); }
        .btn-secondary:hover { border-color:var(--primary); background:var(--bg-card-hover); }
        .btn-sm { padding:8px 20px; font-size:0.9rem; border-radius:12px; }

        /* ===== START SCREEN ===== */
        .start-screen { text-align:center; padding-top:40px; }
        .hero-emoji { font-size:5rem; margin-bottom:16px; animation:bounce 2s ease infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        .hero-title { font-size:2rem; font-weight:800; margin-bottom:24px; }
        .start-btn-area { margin-bottom:36px; }

        .nav-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:500px; margin:0 auto; }
        .nav-card {
            background:var(--bg-card); border:1px solid var(--border); border-radius:18px;
            padding:22px 10px; text-align:center; cursor:pointer; transition:all 0.3s ease;
        }
        .nav-card:hover { border-color:var(--primary); background:var(--bg-card-hover); transform:translateY(-3px); box-shadow:0 6px 20px rgba(217,119,6,0.15); }
        .nav-card .nc-icon { font-size:2rem; margin-bottom:8px; }
        .nav-card .nc-title { font-size:0.9rem; font-weight:700; }
        .nav-card .nc-desc { font-size:0.7rem; color:var(--text-secondary); margin-top:4px; }

        /* ===== TOPICS SCREEN ===== */
        .topics-header { text-align:center; margin-bottom:24px; }
        .topics-header h2 { font-size:1.6rem; font-weight:800; margin-bottom:4px; }
        .topics-header p { color:var(--text-secondary); font-size:0.9rem; }
        .topics-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .topic-card {
            background:var(--bg-card); border:1px solid var(--border); border-radius:18px;
            padding:20px 14px; text-align:center; cursor:pointer; transition:all 0.3s ease;
        }
        .topic-card:hover { border-color:var(--primary); background:var(--bg-card-hover); transform:translateY(-3px); }
        .topic-card .tc-icon { font-size:2.2rem; margin-bottom:6px; }
        .topic-card .tc-name { font-size:1rem; font-weight:700; }
        .topic-card .tc-count { font-size:0.75rem; color:var(--text-secondary); margin-top:3px; }
        .back-bar { text-align:center; margin-bottom:16px; }

        /* ===== QUIZ SCREEN ===== */
        .quiz-top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding:8px 0; }
        .quiz-stats { display:flex; gap:10px; align-items:center; }
        .stat-badge { display:flex; align-items:center; gap:5px; background:var(--bg-card); border:1px solid var(--border); border-radius:30px; padding:7px 13px; font-size:0.85rem; font-weight:600; }
        .quiz-controls { display:flex; gap:8px; align-items:center; }
        .mute-btn { background:var(--bg-card); border:1px solid var(--border); border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; transition:all 0.3s; }
        .mute-btn:hover { border-color:var(--primary); }

        .progress-container { background:var(--bg-card); border-radius:20px; height:6px; margin-bottom:24px; overflow:hidden; border:1px solid var(--border); }
        .progress-bar { height:100%; background:linear-gradient(90deg,var(--mint-dark),var(--mint)); border-radius:20px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }
        .progress-text { text-align:center; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px; }

        .question-card { background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:28px 24px; margin-bottom:20px; }
        .question-card.entering { animation: qSlideIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
        .question-card.exiting-q { animation: qSlideOut 0.25s ease forwards; }
        @keyframes qSlideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
        @keyframes qSlideOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-40px)} }
        .question-category { display:inline-flex; align-items:center; gap:6px; background:rgba(245,158,11,0.15); color:var(--primary-light); border-radius:20px; padding:4px 14px; font-size:0.8rem; font-weight:600; margin-bottom:14px; }
        .question-text { font-size:1.25rem; font-weight:700; line-height:1.7; }

        .answers-grid { display:grid; gap:10px; margin-bottom:16px; }
        .answer-btn {
            background:var(--bg-card); border:2px solid var(--border); border-radius:16px;
            padding:16px 20px; font-family:'Heebo',sans-serif; font-size:1rem; font-weight:500;
            color:var(--text); cursor:pointer; transition:all 0.25s; text-align:right;
            display:flex; align-items:center; gap:12px;
            opacity:0; transform:translateY(10px); animation:answerIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .answer-btn:nth-child(1){animation-delay:0.05s} .answer-btn:nth-child(2){animation-delay:0.1s}
        .answer-btn:nth-child(3){animation-delay:0.15s} .answer-btn:nth-child(4){animation-delay:0.2s}
        @keyframes answerIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .answer-btn:hover:not(.disabled) { border-color:var(--primary); background:rgba(245,158,11,0.08); transform:translateX(-4px); }
        .answer-btn:active:not(.disabled) { transform:scale(0.98); }
        .answer-btn .answer-letter { width:34px; height:34px; border-radius:50%; background:rgba(245,158,11,0.15); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; color:var(--primary-light); flex-shrink:0; transition:all 0.3s; }
        .answer-btn.correct { border-color:var(--correct); background:rgba(52,211,153,0.1); animation:correctPop 0.4s ease; }
        .answer-btn.correct .answer-letter { background:var(--correct); color:white; }
        .answer-btn.wrong { border-color:var(--wrong); background:rgba(251,113,133,0.1); animation:shake 0.4s ease; }
        .answer-btn.wrong .answer-letter { background:var(--wrong); color:white; }
        .answer-btn.disabled { cursor:default; opacity:0.5; }
        .answer-btn.disabled.correct { opacity:1; }
        @keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(8px)} 75%{transform:translateX(-8px)} }

        /* FEEDBACK */
        .feedback-area { overflow:hidden; max-height:0; transition:max-height 0.45s cubic-bezier(0.16,1,0.3,1); }
        .feedback-area.show { max-height:280px; }
        .feedback-card { border-radius:16px; padding:18px 20px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
        .feedback-card.correct-feedback { background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.3); }
        .feedback-card.wrong-feedback { background:rgba(251,113,133,0.1); border:1px solid rgba(251,113,133,0.3); }
        .feedback-icon { font-size:1.6rem; flex-shrink:0; }
        .feedback-title { font-weight:700; font-size:1.05rem; margin-bottom:2px; }
        .feedback-text { font-size:0.9rem; line-height:1.5; color:var(--text-secondary); }

        /* FUN FACT TOGGLE */
        .fact-toggle { display:none; margin-bottom:8px; }
        .fact-toggle.show { display:block; }
        .fact-toggle-btn {
            background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.25); border-radius:12px;
            padding:10px 16px; cursor:pointer; width:100%; text-align:right; font-family:'Heebo',sans-serif;
            font-size:0.85rem; font-weight:600; color:var(--primary-light); transition:all 0.3s;
            display:flex; align-items:center; gap:8px;
        }
        .fact-toggle-btn:hover { background:rgba(245,158,11,0.18); }
        .fact-toggle-btn .arrow { transition:transform 0.3s; display:inline-block; }
        .fact-toggle-btn.open .arrow { transform:rotate(180deg); }
        .fact-content { max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
        .fact-content.open { max-height:120px; }
        .fact-text { padding:10px 16px; font-size:0.85rem; color:var(--text-secondary); line-height:1.6; background:rgba(245,158,11,0.05); border-radius:0 0 12px 12px; border:1px solid rgba(245,158,11,0.15); border-top:none; }

        .next-btn-container { text-align:center; margin-top:12px; opacity:0; animation:fadeInUp 0.3s ease 0.25s forwards; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ===== RESULTS ===== */
        .results-screen { text-align:center; padding-top:16px; }
        .results-card { background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:36px 24px; margin-bottom:20px; }
        .results-emoji { font-size:3.5rem; margin-bottom:14px; }
        .results-title { font-size:1.6rem; font-weight:800; margin-bottom:6px; }
        .results-subtitle { color:var(--text-secondary); font-size:1rem; margin-bottom:28px; line-height:1.6; }
        .score-circle { width:150px; height:150px; margin:0 auto 26px; position:relative; }
        .score-circle svg { transform:rotate(-90deg); width:150px; height:150px; }
        .score-circle circle { fill:none; stroke-width:8; }
        .score-circle .bg { stroke:var(--border); }
        .score-circle .fg { stroke:var(--primary); stroke-linecap:round; transition:stroke-dashoffset 1.5s cubic-bezier(0.16,1,0.3,1); }
        .score-number { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
        .score-number .big { font-size:2.2rem; font-weight:900; line-height:1; }
        .score-number .label { font-size:0.75rem; color:var(--text-secondary); }
        .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
        .stat-card { background:rgba(245,158,11,0.06); border-radius:16px; padding:14px 10px; }
        .stat-card .value { font-size:1.4rem; font-weight:800; }
        .stat-card .label { font-size:0.75rem; color:var(--text-secondary); margin-top:2px; }
        .results-buttons { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
        .share-btn { background:linear-gradient(135deg,var(--mint-dark),var(--mint)); color:#0C1117; font-weight:700; box-shadow:0 4px 16px rgba(16,185,129,0.3); }
        .share-btn:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(16,185,129,0.4); }

        /* ===== ALL-TIME STATS ===== */
        .all-stats-screen { padding-top:16px; }
        .all-stats-header { text-align:center; margin-bottom:24px; }
        .all-stats-header h2 { font-size:1.6rem; font-weight:800; margin-bottom:4px; }
        .all-stats-header p { color:var(--text-secondary); font-size:0.9rem; }
        .big-stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
        .big-stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:20px 14px; text-align:center; }
        .big-stat-card .emoji { font-size:1.6rem; margin-bottom:6px; }
        .big-stat-card .value { font-size:1.8rem; font-weight:900; }
        .big-stat-card .label { font-size:0.75rem; color:var(--text-secondary); margin-top:2px; }
        .category-stats-title { font-size:1.1rem; font-weight:700; margin-bottom:12px; }
        .category-stat-row { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
        .cat-stat-icon { font-size:1.3rem; }
        .cat-stat-name { font-weight:600; font-size:0.9rem; flex:1; }
        .cat-stat-bar-container { flex:1; background:var(--border); border-radius:10px; height:6px; overflow:hidden; }
        .cat-stat-bar { height:100%; border-radius:10px; background:linear-gradient(90deg,var(--mint-dark),var(--mint)); transition:width 0.6s ease; }
        .cat-stat-percent { font-weight:700; font-size:0.85rem; min-width:40px; text-align:left; }
        .reset-stats-btn { display:block; margin:24px auto 0; background:none; border:1px solid var(--border); color:var(--text-secondary); font-family:'Heebo',sans-serif; font-size:0.8rem; padding:8px 18px; border-radius:20px; cursor:pointer; transition:all 0.3s; }
        .reset-stats-btn:hover { border-color:var(--wrong); color:var(--wrong); }

        /* CONFETTI */
        .confetti-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
        .confetti-piece { position:absolute; width:10px; height:10px; top:-10px; animation:confettiFall linear forwards; }
        @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

        /* TOAST */
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg-card); border:1px solid var(--border); color:var(--text); padding:12px 24px; border-radius:14px; font-size:0.9rem; font-weight:600; z-index:999; transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events:none; }
        .toast.show { transform:translateX(-50%) translateY(0); }

        /* INSTALL BANNER */
        .install-banner { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:14px 18px; margin-bottom:16px; align-items:center; gap:12px; animation:fadeInUp 0.4s ease; }
        .install-banner.show { display:flex; }
        .install-banner-text { flex:1; font-size:0.9rem; }
        .install-banner-text strong { color:var(--mint); }
        .install-btn { background:var(--primary-dark); color:white; border:none; border-radius:10px; padding:8px 16px; font-family:'Heebo',sans-serif; font-weight:600; font-size:0.85rem; cursor:pointer; }
        .install-dismiss { background:none; border:none; color:var(--text-secondary); font-size:1.2rem; cursor:pointer; padding:4px; }

        #shareCanvas { display:none; }

        @media (max-width:600px) {
            .app{padding:10px} .logo{font-size:1.9rem} .question-text{font-size:1.1rem}
            .question-card{padding:22px 18px} .answer-btn{padding:14px 16px;font-size:0.95rem}
            .btn{padding:14px 32px;font-size:1rem} .nav-cards{grid-template-columns:repeat(3,1fr);gap:8px}
            .nav-card{padding:16px 6px} .nav-card .nc-icon{font-size:1.6rem}
            .topics-grid{grid-template-columns:repeat(2,1fr);gap:8px} .hero-emoji{font-size:4rem}
            .hero-title{font-size:1.6rem}
        }
        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    </style>
</head>
<body>
    <div class="confetti-container" id="confettiContainer"></div>
    <div class="app">
        <div class="header"><div class="logo" onclick="showStart()">חידו</div></div>

        <div class="install-banner" id="installBanner">
            <div class="install-banner-text"><strong>התקינו את האפליקציה</strong> למסך הבית!</div>
            <button class="install-btn" id="installBtn" onclick="installApp()">התקנה</button>
            <button class="install-dismiss" onclick="dismissInstall()">✕</button>
        </div>

        <!-- START -->
        <div class="screen active" id="startScreen">
            <div class="start-screen">
                <div class="hero-emoji">🧠</div>
                <h1 class="hero-title">שנתחיל?</h1>
                <div class="start-btn-area">
                    <button class="btn btn-primary" onclick="startQuiz()">יאללה, מתחילים!</button>
                </div>
                <div class="nav-cards">
                    <div class="nav-card" onclick="startQuiz()">
                        <div class="nc-icon">⚡</div>
                        <div class="nc-title">חידון מהיר</div>
                        <div class="nc-desc">18 שאלות אקראיות</div>
                    </div>
                    <div class="nav-card" onclick="showTopics()">
                        <div class="nc-icon">📚</div>
                        <div class="nc-title">לפי נושא</div>
                        <div class="nc-desc">בחרו קטגוריה</div>
                    </div>
                    <div class="nav-card" onclick="showAllStats()">
                        <div class="nc-icon">📊</div>
                        <div class="nc-title">סטטיסטיקות</div>
                        <div class="nc-desc">הנתונים שלכם</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TOPICS -->
        <div class="screen" id="topicsScreen">
            <div class="back-bar"><button class="btn btn-secondary btn-sm" onclick="showStart()">← חזרה</button></div>
            <div class="topics-header"><h2>בחרו נושא</h2><p>כל השאלות מהקטגוריה שבחרתם</p></div>
            <div class="topics-grid" id="topicsGrid"></div>
        </div>

        <!-- QUIZ -->
        <div class="screen" id="quizScreen">
            <div class="quiz-top-bar">
                <div class="quiz-stats">
                    <div class="stat-badge"><span>✅</span><span id="correctCount">0</span></div>
                    <div class="stat-badge"><span>❌</span><span id="wrongCount">0</span></div>
                </div>
                <div class="quiz-controls">
                    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
                    <button class="btn btn-secondary btn-sm" onclick="quitQuiz()">יציאה</button>
                </div>
            </div>
            <div class="progress-text" id="progressText"></div>
            <div class="progress-container"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
            <div class="question-card" id="questionCard">
                <div class="question-category" id="questionCategory"></div>
                <div class="question-text" id="questionText"></div>
            </div>
            <div class="answers-grid" id="answersGrid"></div>
            <div class="feedback-area" id="feedbackArea">
                <div class="feedback-card" id="feedbackCard">
                    <div class="feedback-icon" id="feedbackIcon"></div>
                    <div><div class="feedback-title" id="feedbackTitle"></div><div class="feedback-text" id="feedbackText"></div></div>
                </div>
                <div class="fact-toggle" id="factToggle">
                    <button class="fact-toggle-btn" id="factToggleBtn" onclick="toggleFact()">
                        <span>💡</span> <span>הידעת?</span> <span class="arrow">▼</span>
                    </button>
                    <div class="fact-content" id="factContent"><div class="fact-text" id="factText"></div></div>
                </div>
                <div class="next-btn-container">
                    <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">השאלה הבאה ➜</button>
                </div>
            </div>

// ===== AUDIO =====
let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}
function playCorrectSound() {
    if (isMuted) return;
    try {
        const ctx = getAudioCtx();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(523, ctx.currentTime);
        o.frequency.linearRampToValueAtTime(784, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.15, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.25);
    } catch(e) {}
}
function playWrongSound() {
    if (isMuted) return;
    try {
        const ctx = getAudioCtx();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(300, ctx.currentTime);
        o.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
    } catch(e) {}
}
function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
    localStorage.setItem('triviaMuted', isMuted ? '1' : '0');
}

// ===== STATS =====
function loadStats() { try{return JSON.parse(localStorage.getItem('triviaStats'))||defaultStats()}catch{return defaultStats()} }
function defaultStats() { return {totalQuizzes:0,totalCorrect:0,totalQuestions:0,bestPercent:0,categories:{}}; }
function saveStats(s) { localStorage.setItem('triviaStats',JSON.stringify(s)); }
function recordQuizResult(quizQ,correctIdx) {
    const stats=loadStats(); stats.totalQuizzes++; stats.totalCorrect+=correctIdx.length; stats.totalQuestions+=quizQ.length;
    const pct=Math.round((correctIdx.length/quizQ.length)*100);
    if(pct>stats.bestPercent) stats.bestPercent=pct;
    quizQ.forEach((q,i)=>{
        if(!stats.categories[q.cat]) stats.categories[q.cat]={correct:0,total:0};
        stats.categories[q.cat].total++;
        if(correctIdx.includes(i)) stats.categories[q.cat].correct++;
    });
    saveStats(stats);
}

// ===== SCREENS =====
function showScreen(id) {
    const cur=document.querySelector('.screen.active'), nxt=document.getElementById(id);
    if(cur===nxt) return;
    if(cur){cur.classList.remove('active');cur.classList.add('exiting');cur.addEventListener('animationend',()=>cur.classList.remove('exiting'),{once:true});}
    setTimeout(()=>nxt.classList.add('active'),cur?180:0);
}
function showStart(){showScreen('startScreen')}
function showTopics(){renderTopics();showScreen('topicsScreen')}
function quitQuiz(){if(confirm('לצאת מהחידון?'))showStart()}

function renderTopics() {
    const grid=document.getElementById('topicsGrid');
    const cats=Object.keys(categoryMeta);
    grid.innerHTML=cats.map(cat=>{
        const count=questions.filter(q=>q.cat===cat).length;
        const meta=categoryMeta[cat];
        return `<div class="topic-card" onclick="startQuiz('${cat}')">
            <div class="tc-icon">${meta.icon}</div>
            <div class="tc-name">${cat}</div>
            <div class="tc-count">${count} שאלות</div>
        </div>`;
    }).join('');
}

// ===== QUIZ =====
function startQuiz(category) {
    selectedCategory=category||null;
    let pool=selectedCategory?questions.filter(q=>q.cat===selectedCategory):[...questions];
    pool=shuffleArray(pool);
    currentQuiz=pool.slice(0,Math.min(QUIZ_SIZE,pool.length));
    currentIndex=0; score=0; wrongCount=0; answered=false; correctIndicesThisQuiz=[];
    showScreen('quizScreen'); updateQuizStats(); showQuestion();
}

function showQuestion() {
    if(currentIndex>=currentQuiz.length){showResults();return;}
    answered=false;
    const q=currentQuiz[currentIndex], letters=['א','ב','ג','ד'];
    document.getElementById('progressText').textContent=`שאלה ${currentIndex+1} מתוך ${currentQuiz.length}`;
    document.getElementById('progressBar').style.width=`${(currentIndex/currentQuiz.length)*100}%`;
    const meta=categoryMeta[q.cat]||{icon:'💡'};
    document.getElementById('questionCategory').innerHTML=`${meta.icon} ${q.cat}`;
    document.getElementById('questionText').textContent=q.q;
    const card=document.getElementById('questionCard');
    card.classList.remove('entering','exiting-q'); void card.offsetHeight; card.classList.add('entering');
    document.getElementById('answersGrid').innerHTML=q.a.map((ans,i)=>
        `<button class="answer-btn" onclick="selectAnswer(${i})"><span class="answer-letter">${letters[i]}</span><span>${ans}</span></button>`
    ).join('');
    document.getElementById('feedbackArea').classList.remove('show');
    document.getElementById('factToggle').classList.remove('show');
    document.getElementById('factContent').classList.remove('open');
    document.getElementById('factToggleBtn').classList.remove('open');
}

function selectAnswer(index) {
    if(answered) return; answered=true;
    const q=currentQuiz[currentIndex], isCorrect=index===q.c;
    document.querySelectorAll('.answer-btn').forEach((btn,i)=>{
        btn.classList.add('disabled');
        if(i===q.c) btn.classList.add('correct');
        if(i===index&&!isCorrect) btn.classList.add('wrong');
    });
    if(isCorrect){score++;correctIndicesThisQuiz.push(currentIndex);playCorrectSound();}
    else{wrongCount++;playWrongSound();}
    updateQuizStats(); showFeedback(isCorrect,q);
}

function showFeedback(isCorrect,q) {
    const card=document.getElementById('feedbackCard');
    card.className='feedback-card '+(isCorrect?'correct-feedback':'wrong-feedback');
    if(isCorrect){
        const m=['מדהים!','נכון!','בול פגיעה!','מצוין!','יופי!'];
        document.getElementById('feedbackIcon').textContent='✅';
        document.getElementById('feedbackTitle').textContent=m[Math.floor(Math.random()*m.length)];
        document.getElementById('feedbackText').textContent='';
        // Show fact toggle
        if(q.fact){
            document.getElementById('factToggle').classList.add('show');
            document.getElementById('factText').textContent=q.fact;
            document.getElementById('factContent').classList.remove('open');
            document.getElementById('factToggleBtn').classList.remove('open');
        }
    } else {
        const m=['לא הפעם...','כמעט!','ממשיכים!','בפעם הבאה!'];
        document.getElementById('feedbackIcon').textContent='❌';
        document.getElementById('feedbackTitle').textContent=m[Math.floor(Math.random()*m.length)];
        document.getElementById('feedbackText').textContent=`התשובה הנכונה: ${q.a[q.c]}`;
        document.getElementById('factToggle').classList.remove('show');
    }
    document.getElementById('nextBtn').textContent=currentIndex>=currentQuiz.length-1?'📊 לתוצאות':'השאלה הבאה ➜';
    document.getElementById('feedbackArea').classList.add('show');
}

function toggleFact() {
    document.getElementById('factContent').classList.toggle('open');
    document.getElementById('factToggleBtn').classList.toggle('open');
}

function nextQuestion() {
    const card=document.getElementById('questionCard');
    card.classList.remove('entering'); card.classList.add('exiting-q');
    setTimeout(()=>{currentIndex++;showQuestion();},200);
}
function updateQuizStats() {
    document.getElementById('correctCount').textContent=score;
    document.getElementById('wrongCount').textContent=wrongCount;
}

// ===== RESULTS =====
function showResults() {
    recordQuizResult(currentQuiz,correctIndicesThisQuiz);
    const total=currentQuiz.length, pct=Math.round((score/total)*100); lastPercent=pct;
    const msg=scoreMessages[score]||scoreMessages[Math.max(0,Math.min(score,18))];
    const fallback=score>18?scoreMessages[18]:(score<0?scoreMessages[0]:{emoji:'🤷',title:`${score}/${total}`,sub:'מעניין...'});
    const m=msg||fallback;

    document.getElementById('resultsEmoji').textContent=m.emoji;
    document.getElementById('resultsTitle').textContent=m.title;
    document.getElementById('resultsSubtitle').textContent=m.sub;
    document.getElementById('statCorrect').textContent=score;
    document.getElementById('statWrong').textContent=wrongCount;
    document.getElementById('scorePercent').textContent=`${pct}%`;

    const circle=document.getElementById('scoreCircle');
    circle.style.transition='none'; circle.style.strokeDashoffset='408.4'; circle.style.stroke='var(--primary)';
    showScreen('resultsScreen');
    setTimeout(()=>{
        circle.style.transition='stroke-dashoffset 1.5s cubic-bezier(0.16,1,0.3,1)';
        circle.style.strokeDashoffset=408.4*(1-score/total);
        if(pct>=80) circle.style.stroke='var(--correct)';
        else if(pct>=50) circle.style.stroke='var(--gold)';
        else circle.style.stroke='var(--wrong)';
    },150);
    if(score===total) launchConfetti();
}

// ===== CONFETTI =====
function launchConfetti() {
    const c=document.getElementById('confettiContainer');
    const colors=['#F59E0B','#FCD34D','#E74C3C','#FF8A65','#D97706','#34D399','#FFF5E6'];
    for(let i=0;i<50;i++){
        setTimeout(()=>{
            const p=document.createElement('div'); p.className='confetti-piece';
            p.style.left=Math.random()*100+'%';
            p.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
            p.style.width=(Math.random()*8+5)+'px'; p.style.height=(Math.random()*8+5)+'px';
            p.style.borderRadius=Math.random()>0.5?'50%':'2px';
            p.style.animationDuration=(Math.random()*2+1.5)+'s';
            c.appendChild(p); setTimeout(()=>p.remove(),4000);
        },i*40);
    }
}

// ===== SHARE =====
async function shareResults(){
    const canvas=document.getElementById('shareCanvas'),ctx=canvas.getContext('2d');
    const W=600,H=400; canvas.width=W;canvas.height=H;
    const bg=ctx.createLinearGradient(0,0,W,H); bg.addColorStop(0,'#0C1117');bg.addColorStop(1,'#131C27');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(245,158,11,0.08)';ctx.beginPath();ctx.arc(100,80,120,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(231,76,60,0.06)';ctx.beginPath();ctx.arc(500,320,100,0,Math.PI*2);ctx.fill();
    ctx.textAlign='center';ctx.fillStyle='#F59E0B';ctx.font='900 32px Heebo,sans-serif';ctx.fillText('חידו',W/2,55);
    const cx=W/2,cy=185,r=65;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#1E3044';ctx.lineWidth=10;ctx.stroke();
    const pct=lastPercent/100,color=lastPercent>=80?'#34D399':lastPercent>=50?'#FBBF24':'#FB7185';
    ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.strokeStyle=color;ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
    ctx.fillStyle='#FFF5E6';ctx.font='900 40px Heebo,sans-serif';ctx.fillText(`${lastPercent}%`,cx,cy+12);
    ctx.font='600 18px Heebo,sans-serif';ctx.fillStyle='#34D399';ctx.fillText(`✅ ${score} נכונות`,W/2-80,290);
    ctx.fillStyle='#FB7185';ctx.fillText(`❌ ${wrongCount} שגויות`,W/2+80,290);
    ctx.fillStyle='#BFA47A';ctx.font='400 16px Heebo,sans-serif';ctx.fillText('בואו לשחק גם!',W/2,345);
    try{
        const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
        const file=new File([blob],'chido-score.png',{type:'image/png'});
        if(navigator.share&&navigator.canShare({files:[file]})){
            await navigator.share({title:'חידו',text:`קיבלתי ${lastPercent}% בחידו! (${score}/${currentQuiz.length})`,files:[file]});
        }else if(navigator.share){
            await navigator.share({title:'חידו',text:`קיבלתי ${lastPercent}% בחידו! (${score}/${currentQuiz.length})`});
        }else{
            const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='chido-score.png';a.click();URL.revokeObjectURL(url);showToast('התמונה הורדה!');
        }
    }catch(e){if(e.name!=='AbortError')showToast('לא ניתן לשתף כרגע')}
}

// ===== ALL STATS =====
function showAllStats(){
    const stats=loadStats(),avg=stats.totalQuestions>0?Math.round((stats.totalCorrect/stats.totalQuestions)*100):0;
    document.getElementById('bigStatsGrid').innerHTML=`
        <div class="big-stat-card"><div class="emoji">🎯</div><div class="value">${stats.totalQuizzes}</div><div class="label">חידונים</div></div>
        <div class="big-stat-card"><div class="emoji">✅</div><div class="value">${stats.totalCorrect}</div><div class="label">תשובות נכונות</div></div>
        <div class="big-stat-card"><div class="emoji">📈</div><div class="value">${avg}%</div><div class="label">ממוצע</div></div>
        <div class="big-stat-card"><div class="emoji">🏆</div><div class="value">${stats.bestPercent}%</div><div class="label">שיא אישי</div></div>`;
    const cats=Object.entries(stats.categories).sort((a,b)=>(b[1].total>0?b[1].correct/b[1].total:0)-(a[1].total>0?a[1].correct/a[1].total:0));
    const cont=document.getElementById('categoryStatsContainer');
    if(!cats.length) cont.innerHTML='<p style="color:var(--text-secondary);text-align:center;padding:20px">שחקו חידון כדי לראות סטטיסטיקות!</p>';
    else cont.innerHTML=cats.map(([cat,d])=>{const pct=d.total>0?Math.round((d.correct/d.total)*100):0;const meta=categoryMeta[cat]||{icon:'💡'};
        return `<div class="category-stat-row"><div class="cat-stat-icon">${meta.icon}</div><div class="cat-stat-name">${cat}</div><div class="cat-stat-bar-container"><div class="cat-stat-bar" style="width:${pct}%"></div></div><div class="cat-stat-percent">${pct}%</div></div>`;}).join('');
    showScreen('allStatsScreen');
}
function resetStats(){if(confirm('בטוח? כל הנתונים יימחקו.')){localStorage.removeItem('triviaStats');showAllStats();}}

// ===== UTILS =====
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Keyboard
document.addEventListener('keydown',(e)=>{
    if(!document.getElementById('quizScreen').classList.contains('active'))return;
    if(answered&&e.key==='Enter'){nextQuestion();return;}
    const m={'1':0,'2':1,'3':2,'4':3};
    if(m[e.key]!==undefined&&!answered)selectAnswer(m[e.key]);
});

// PWA
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').classList.add('show');});
async function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted'){document.getElementById('installBanner').classList.remove('show');showToast('האפליקציה הותקנה!');}deferredPrompt=null;}
function dismissInstall(){document.getElementById('installBanner').classList.remove('show');}

// Load mute preference
isMuted=localStorage.getItem('triviaMuted')==='1';
document.getElementById('muteBtn').textContent=isMuted?'🔇':'🔊';

// Register SW
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();};}
</script>
